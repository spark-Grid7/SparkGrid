<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SPARK GRID | Final Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { width: 100%; text-align: left; padding: 1rem; border-radius: 1rem; font-weight: bold; color: #64748b; }
        .nav-active { background: #0ea5e9; color: white; }
    </style>
</head>
<body class="flex p-6 gap-6 h-screen">

    <div id="auth-screen" class="fixed inset-0 bg-slate-950 z-[9999] flex items-center justify-center">
        <div class="glass p-10 w-[350px] rounded-[2rem] text-center">
            <h1 class="text-2xl font-black mb-8 text-sky-400 italic">SPARK GRID</h1>
            <input type="text" id="u" placeholder="USERNAME" class="w-full bg-slate-900 p-4 rounded-xl mb-4 outline-none">
            <input type="password" id="p" placeholder="PASSWORD" class="w-full bg-slate-900 p-4 rounded-xl mb-6 outline-none">
            <button onclick="handleAuth()" class="w-full bg-sky-600 py-4 rounded-xl font-bold">Sign In</button>
        </div>
    </div>

    <aside id="sidebar" class="hidden w-64 glass rounded-[2rem] p-6 space-y-4">
        <h2 class="font-black italic text-sky-400 text-xl mb-8">SPARK</h2>
        <nav class="space-y-2">
            <button onclick="nav('home')" id="n-home" class="nav-btn nav-active">Dashboard</button>
            <button onclick="nav('dev')" id="n-dev" class="nav-btn">Manage Devices</button>
            <button onclick="nav('ana')" id="n-ana" class="nav-btn">Analytics</button>
            <button onclick="nav('shd')" id="n-shd" class="nav-btn">Shedding</button>
        </nav>
    </aside>

    <main id="main-ui" class="hidden flex-1 space-y-6 overflow-y-auto">
        <section id="p-home" class="grid grid-cols-3 gap-6">
            <div class="glass p-6 rounded-2xl border-l-4 border-sky-500"><p class="text-[10px] font-bold text-slate-500">LOAD</p><h2 id="w" class="text-3xl font-black">0W</h2></div>
            <div class="glass p-6 rounded-2xl border-l-4 border-emerald-500"><p class="text-[10px] font-bold text-slate-500">LIMIT</p><h2 id="l" class="text-3xl font-black">100W</h2></div>
            <div class="glass p-6 rounded-2xl border-l-4 border-amber-500"><p class="text-[10px] font-bold text-slate-500">COST</p><h2 id="c" class="text-3xl font-black">₹0.00</h2></div>
            <div class="glass p-8 rounded-[2rem] col-span-3">
                <h3 class="text-xs font-bold mb-4 uppercase text-sky-400 italic">Current Grid Activity</h3>
                <div id="act-list" class="space-y-3"></div>
            </div>
        </section>

        <section id="p-dev" class="hidden space-y-6">
            <div class="glass p-10 rounded-[2rem]">
                <h2 class="text-xl font-bold mb-6 italic">Add Hardware</h2>
                <div class="flex gap-4">
                    <input id="dn" placeholder="Device Name" class="flex-1 bg-slate-900 p-4 rounded-xl outline-none">
                    <input id="dp" placeholder="Pin" class="w-24 bg-slate-900 p-4 rounded-xl outline-none">
                    <button onclick="addHardware()" class="bg-sky-600 px-8 rounded-xl font-bold">Add</button>
                </div>
            </div>
            <div class="glass p-10 rounded-[2rem]">
                <h3 class="font-bold mb-4 text-slate-400 italic">Connected Roster</h3>
                <div id="roster-list" class="grid grid-cols-2 gap-4"></div>
            </div>
        </section>

        <section id="p-ana" class="hidden glass p-10 rounded-[2rem] space-y-6">
            <div class="flex justify-between items-center"><h2 class="text-xl font-bold italic">Energy Usage</h2><a href="/admin/export" class="bg-emerald-600 px-4 py-2 rounded-lg text-xs font-bold uppercase">Export Excel</a></div>
            <canvas id="usageChart"></canvas>
        </section>

        <section id="p-shd" class="hidden space-y-6">
            <div class="glass p-10 rounded-[2rem]">
                <h2 class="text-xl font-bold italic mb-6">Threshold Management</h2>
                <div class="flex gap-4">
                    <input type="number" id="t-limit" value="100" class="bg-slate-900 p-4 rounded-xl outline-none border border-slate-800">
                    <button onclick="saveThresh()" class="bg-sky-600 px-8 rounded-xl font-bold">Update</button>
                </div>
            </div>
            <div class="glass p-10 rounded-[2rem]">
                <h3 class="font-bold mb-4 italic text-sky-400">Appliance Priorities</h3>
                <div id="prio-manage" class="space-y-4"></div>
            </div>
        </section>
    </main>

    <script>
        async function handleAuth() {
            const u = document.getElementById('u').value, p = document.getElementById('p').value;
            const res = await fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
            if(res.ok) {
                document.getElementById('auth-screen').style.display='none';
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                startUpdates();
            } else alert("Access Denied");
        }

        function nav(id) {
            ['p-home','p-dev','p-ana','p-shd'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById('p-'+id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('n-'+id).classList.add('nav-active');
            if(id === 'ana') renderChart();
            if(id === 'shd') renderShedding();
            if(id === 'dev') renderRoster();
        }

        function startUpdates() {
            setInterval(async () => {
                const res = await fetch('/grid/live');
                const d = await res.json();
                document.getElementById('w').innerText = d.watts + 'W';
                document.getElementById('l').innerText = d.limit + 'W';
                document.getElementById('c').innerText = '₹' + d.cost;
                refreshLiveView();
            }, 3000);
        }

        async function refreshLiveView() {
    const res = await fetch('/devices');
    const data = await res.json();
    
    // This updated version adds the actual toggle button back in
    document.getElementById('act-list').innerHTML = data.map(d => `
        <div class="glass p-4 rounded-xl flex justify-between items-center ${d.state ? 'border-l-4 border-emerald-500' : 'opacity-40'}">
            <div class="flex flex-col">
                <span class="text-xs font-bold uppercase">${d.name}</span>
                <span class="text-[10px] text-sky-400">${d.priority} PRIORITY</span>
            </div>
            
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" class="sr-only peer" ${d.state ? 'checked' : ''} onchange="toggleDevice(${d.pin})">
                <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
            </label>
        </div>
    `).join('');
}

// You also need this function to tell the Python backend to flip the switch
async function toggleDevice(pin) {
    await fetch('/devices/toggle', {
        method: 'POST', 
        headers: {'Content-Type': 'application/json'}, 
        body: JSON.stringify({ pin: pin })
    });
}

        // --- DEVICE MANAGEMENT LOGIC ---
        async function renderRoster() {
            const res = await fetch('/devices');
            const data = await res.json();
            document.getElementById('roster-list').innerHTML = data.map(d => `
                <div class="bg-slate-900 p-4 rounded-xl flex justify-between items-center text-xs font-bold">
                    <span>${d.name} (Pin ${d.pin})</span>
                    <button onclick="removeDevice(${d.pin})" class="text-rose-500 hover:text-rose-400"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        async function addHardware() {
            const n = document.getElementById('dn').value, p = document.getElementById('dp').value;
            await fetch('/devices/add', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:n, pin:p})});
            renderRoster();
        }

        async function removeDevice(pin) {
            await fetch('/devices/remove', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pin:pin})});
            renderRoster();
        }

        // --- SHEDDING LOGIC ---
        async function saveThresh() {
            const v = document.getElementById('t-limit').value;
            await fetch('/grid/threshold', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({limit:v})});
            alert("Threshold Set");
        }

        async function renderShedding() {
            const res = await fetch('/devices');
            const data = await res.json();
            document.getElementById('prio-manage').innerHTML = data.map(d => `
                <div class="bg-slate-900 p-4 rounded-xl flex justify-between items-center text-xs">
                    <span>${d.name}</span>
                    <select onchange="updatePrio(${d.pin}, this.value)" class="bg-slate-950 p-2 rounded-lg outline-none">
                        <option value="High" ${d.priority==='High'?'selected':''}>High</option>
                        <option value="Medium" ${d.priority==='Medium'?'selected':''}>Medium</option>
                        <option value="Low" ${d.priority==='Low'?'selected':''}>Low</option>
                    </select>
                </div>
            `).join('');
        }

        async function updatePrio(pin, p) {
            await fetch('/devices/update-priority', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pin:pin, priority:p})});
        }

        // --- ANALYTICS ---
        let chart;
        function renderChart() {
            const ctx = document.getElementById('usageChart').getContext('2d');
            const vals = [30, 140, 45, 110, 20, 80, 150];
            const colors = vals.map(v => v > 100 ? '#f43f5e' : '#10b981');
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type:'bar', data: { labels:['M','T','W','T','F','S','S'], datasets:[{ data:vals, backgroundColor:colors, borderRadius:8 }] }, options:{ plugins:{ legend:{ display:false } } } });
        }
        // --- ADD/REPLACE THIS FUNCTION IN YOUR index.html SCRIPT ---

async function refreshLiveView() {
    const res = await fetch('/devices');
    const data = await res.json();
    
    const container = document.getElementById('act-list');
    if(container) {
        // This generates the HTML for your 5V Pump and its Switch
        container.innerHTML = data.map(d => `
            <div class="glass p-4 rounded-xl flex justify-between items-center ${d.state ? 'border-l-4 border-emerald-500' : 'opacity-40'}">
                <div class="flex flex-col">
                    <span class="text-xs font-bold uppercase">${d.name}</span>
                    <span class="text-[10px] text-sky-400 font-bold">${d.priority} PRIORITY</span>
                </div>
                
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" class="sr-only peer" ${d.state ? 'checked' : ''} onchange="toggleDevice(${d.pin})">
                    <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-emerald-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                </label>
            </div>
        `).join('');
    }
}

// Function to handle the hardware switch
async function toggleDevice(pin) {
    await fetch('/devices/toggle', {
        method: 'POST', 
        headers: {'Content-Type': 'application/json'}, 
        body: JSON.stringify({ pin: pin })
    });
    refreshLiveView(); // Update UI immediately
}
    </script>
</body>
</html>
